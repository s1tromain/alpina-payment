<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Реквизиты</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0D0D;
      --bg2: #121212;
      --surface: #1A1A1A;
      --surface-h: #1E1E1E;
      --teal: #2FE3E0;
      --teal-mid: #1FB8B4;
      --teal-dark: #0E6F73;
      --text: #FFFFFF;
      --text2: #A0A0A0;
      --border: rgba(255,255,255,.06);
      --border-t: rgba(47,227,224,.12);
      --err: #E05252;
      --warn: #F5A623;
      --ok: #2FE3E0;
      --radius: 12px;
    }

    body {
      font-family: 'Inter','Segoe UI',system-ui,sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(18,18,18,.85);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }

    .topbar-title {
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .04em;
      background: linear-gradient(135deg,#2FE3E0,#1FB8B4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .container { max-width: 100%; margin: 0 auto; padding: 24px 20px 60px; }

    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; text-align: center; }

    /* Auth */
    .auth-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
    }
    .auth-box label { font-size: .82rem; color: var(--text2); display: block; margin-bottom: 8px; }
    .auth-box input {
      width: 100%; max-width: 300px;
      padding: 10px 14px; font-size: .9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      margin-bottom: 12px;
    }
    .auth-box input:focus { border-color: var(--teal-mid); }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      font-size: .85rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: .2s;
    }
    .btn-primary { background: linear-gradient(135deg,#2FE3E0,#0E6F73); color: #000; }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(47,227,224,.25); }
    .btn-sm { padding: 6px 14px; font-size: .78rem; }
    .btn-danger { background: rgba(224,82,82,.15); color: var(--err); border: 1px solid rgba(224,82,82,.3); }
    .btn-danger:hover { background: rgba(224,82,82,.25); }
    .btn-warn { background: rgba(245,166,35,.15); color: var(--warn); border: 1px solid rgba(245,166,35,.3); }
    .btn-warn:hover { background: rgba(245,166,35,.25); }
    .btn-ok { background: rgba(47,227,224,.1); color: var(--ok); border: 1px solid rgba(47,227,224,.2); }
    .btn-ok:hover { background: rgba(47,227,224,.2); }
    .btn-secondary { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface-h); color: var(--text); }

    .actions { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th { text-align: left; padding: 10px 12px; font-size: .72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em; color: var(--text2);
      border-bottom: 1px solid var(--border); background: var(--surface); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(47,227,224,.02); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-free { background: rgba(47,227,224,.1); color: var(--ok); }
    .badge-busy { background: rgba(245,166,35,.1); color: var(--warn); }
    .badge-inactive { background: rgba(160,160,160,.1); color: var(--text2); }
    .badge-active { background: rgba(47,227,224,.08); color: var(--ok); }

    .card-number { font-family: 'SF Mono','Cascadia Code','Consolas',monospace; letter-spacing: .03em; }

    .td-actions { white-space: nowrap; }
    .td-actions .btn { margin-right: 4px; margin-bottom: 4px; }

    /* Fullscreen modal */
    #requisiteModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--bg);
      z-index: 9999;
      flex-direction: column;
      overflow-y: auto;
    }
    #requisiteModal.open {
      display: flex;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg2);
    }
    .modal-header h3 { font-size: 1.1rem; margin: 0; }
    .modal-close-btn {
      background: none; border: none; color: var(--text2); font-size: 1.8rem;
      cursor: pointer; padding: 6px 10px; line-height: 1; transition: color .2s;
    }
    .modal-close-btn:hover { color: var(--text); }
    .modal-body {
      flex: 1; padding: 28px 20px;
      display: flex; flex-direction: column; justify-content: flex-start;
      max-width: 520px; width: 100%; margin: 0 auto;
      padding-top: 32px;
    }
    .modal-body .field { margin-bottom: 24px; }
    .modal-body .field label { display: block; font-size: .85rem; color: var(--text2); margin-bottom: 8px; font-weight: 600; }
    .modal-body .field input {
      width: 100%;
      padding: 16px 18px; font-size: 1.05rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .modal-body .field input:focus { border-color: var(--teal-mid); box-shadow: 0 0 0 3px rgba(47,227,224,.1); }
    .modal-footer {
      padding: 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg2);
    }
    .modal-footer .modal-btns { display: flex; gap: 12px; max-width: 520px; margin: 0 auto; }
    .modal-btns .btn { flex: 1; padding: 16px 20px; font-size: 1rem; border-radius: 10px; }

    /* Toggle switch */
    .toggle-switch {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      padding: 12px 0;
    }
    .toggle-switch input { display: none; }
    .toggle-slider {
      position: relative;
      width: 50px; height: 28px;
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      transition: background .25s, border-color .25s;
      flex-shrink: 0;
    }
    .toggle-slider::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      background: var(--text2);
      border-radius: 50%;
      transition: transform .25s, background .25s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: rgba(47,227,224,.15);
      border-color: var(--teal-mid);
    }
    .toggle-switch input:checked + .toggle-slider::after {
      transform: translateX(22px);
      background: var(--teal);
    }
    .toggle-label {
      font-size: .95rem;
      color: var(--text);
    }

    .empty-msg { text-align: center; padding: 32px; color: var(--text2); font-size: .88rem; }
    .error-msg { color: var(--err); font-size: .82rem; margin-top: 8px; text-align: center; }
    .info-msg { color: var(--ok); font-size: .82rem; margin-top: 8px; text-align: center; }

    /* Monitoring cards */
    .monitor-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .monitor-card {
      background: var(--bg2);
      border: 1px solid var(--border-t);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .monitor-card .mc-label {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .monitor-card .mc-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--teal);
    }
    .monitor-card .mc-sub {
      font-size: .72rem;
      color: var(--text2);
      margin-top: 4px;
    }

    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 10px 20px;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text2);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: .2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--teal);
      border-bottom-color: var(--teal);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    @media (max-width:600px) {
      .container { padding: 16px 12px 40px; }
      th, td { padding: 8px 6px; font-size: .75rem; }
      .btn-sm { padding: 5px 10px; font-size: .72rem; }
      .monitor-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">ALPINA PAY-OUT — Admin</span>
</div>

<div class="container" id="mainContainer">
  <h1>Управление реквизитами</h1>

  <div class="auth-box" id="authBox">
    <label>Пароль администратора</label>
    <input type="password" id="adminPassword" placeholder="Введите пароль" autocomplete="off">
    <br>
    <button class="btn btn-primary" id="loginBtn">Войти</button>
    <div class="error-msg" id="authError" style="display:none"></div>
  </div>

  <div id="mainPanel" style="display:none">

    <!-- Monitoring cards -->
    <div class="monitor-row" id="monitorRow">
      <div class="monitor-card">
        <div class="mc-label">Сумма за сегодня</div>
        <div class="mc-value" id="monTotalRub">0 ₽</div>
        <div class="mc-sub">Лимит: <span id="monLimitRub">200 000</span> ₽</div>
      </div>
      <div class="monitor-card">
        <div class="mc-label">Осталось</div>
        <div class="mc-value" id="monRemaining">200 000 ₽</div>
        <div class="mc-sub" id="monPercent">0%</div>
      </div>
      <div class="monitor-card">
        <div class="mc-label">Заявок обработано</div>
        <div class="mc-value" id="monOrdersCount">0</div>
        <div class="mc-sub">одобрено сегодня</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="requisites">Реквизиты</button>
      <button class="tab-btn" data-tab="history">История</button>
    </div>

    <!-- Tab: Requisites -->
    <div class="tab-content active" id="tabRequisites">
      <div class="actions">
        <button class="btn btn-primary" id="addCardBtn">+ Добавить карту</button>
        <button class="btn btn-secondary" id="refreshBtn">Обновить</button>
      </div>

      <div class="info-msg" id="statusMsg" style="display:none"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Номер карты</th>
              <th>Банк</th>
              <th>Активна</th>
              <th>Статус</th>
              <th>Заявка</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="cardsBody">
            <tr><td colspan="6" class="empty-msg">Загрузка…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Tab: History -->
    <div class="tab-content" id="tabHistory">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Дата</th>
              <th>Заявок</th>
              <th>Сумма ₽</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            <tr><td colspan="3" class="empty-msg">Загрузка…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Fullscreen Add/Edit Modal -->
<div id="requisiteModal">
  <div class="modal-header">
    <h3 id="modalTitle">Добавить карту</h3>
    <button class="modal-close-btn" id="modalCloseX">&times;</button>
  </div>
  <div class="modal-body">
    <div class="field">
      <label>Номер карты</label>
      <input type="text" id="modalCardNumber" placeholder="0000 0000 0000 0000" maxlength="30" autocomplete="off" inputmode="numeric">
    </div>
    <div class="field">
      <label>Название банка</label>
      <input type="text" id="modalBankName" placeholder="Например: Anor Bank" maxlength="100" autocomplete="off">
    </div>
    <div class="field">
      <label>Статус</label>
      <label class="toggle-switch">
        <input type="checkbox" id="modalIsActive" checked>
        <span class="toggle-slider"></span>
        <span class="toggle-label" id="modalIsActiveLabel">Активна</span>
      </label>
    </div>
    <div class="error-msg" id="modalError" style="display:none"></div>
  </div>
  <div class="modal-footer">
    <div class="modal-btns">
      <button class="btn btn-secondary" id="modalCancel">Отмена</button>
      <button class="btn btn-primary" id="modalSave">Сохранить</button>
    </div>
  </div>
</div>

<script src="/js/admin-requisites.js"></script>

</body>
</html>
