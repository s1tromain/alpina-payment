<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Реквизиты</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0D0D;
      --bg2: #121212;
      --surface: #1A1A1A;
      --surface-h: #1E1E1E;
      --teal: #2FE3E0;
      --teal-mid: #1FB8B4;
      --teal-dark: #0E6F73;
      --text: #FFFFFF;
      --text2: #A0A0A0;
      --border: rgba(255,255,255,.06);
      --border-t: rgba(47,227,224,.12);
      --err: #E05252;
      --warn: #F5A623;
      --ok: #2FE3E0;
      --radius: 12px;
    }

    body {
      font-family: 'Inter','Segoe UI',system-ui,sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(18,18,18,.85);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }

    .topbar-title {
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .04em;
      background: linear-gradient(135deg,#2FE3E0,#1FB8B4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 24px 20px 60px; }

    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; text-align: center; }

    /* Auth */
    .auth-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
    }
    .auth-box label { font-size: .82rem; color: var(--text2); display: block; margin-bottom: 8px; }
    .auth-box input {
      width: 100%; max-width: 300px;
      padding: 10px 14px; font-size: .9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      margin-bottom: 12px;
    }
    .auth-box input:focus { border-color: var(--teal-mid); }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      font-size: .85rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: .2s;
    }
    .btn-primary { background: linear-gradient(135deg,#2FE3E0,#0E6F73); color: #000; }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(47,227,224,.25); }
    .btn-sm { padding: 6px 14px; font-size: .78rem; }
    .btn-danger { background: rgba(224,82,82,.15); color: var(--err); border: 1px solid rgba(224,82,82,.3); }
    .btn-danger:hover { background: rgba(224,82,82,.25); }
    .btn-warn { background: rgba(245,166,35,.15); color: var(--warn); border: 1px solid rgba(245,166,35,.3); }
    .btn-warn:hover { background: rgba(245,166,35,.25); }
    .btn-ok { background: rgba(47,227,224,.1); color: var(--ok); border: 1px solid rgba(47,227,224,.2); }
    .btn-ok:hover { background: rgba(47,227,224,.2); }
    .btn-secondary { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface-h); color: var(--text); }

    .actions { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th { text-align: left; padding: 10px 12px; font-size: .72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em; color: var(--text2);
      border-bottom: 1px solid var(--border); background: var(--surface); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(47,227,224,.02); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-free { background: rgba(47,227,224,.1); color: var(--ok); }
    .badge-busy { background: rgba(245,166,35,.1); color: var(--warn); }
    .badge-inactive { background: rgba(160,160,160,.1); color: var(--text2); }
    .badge-active { background: rgba(47,227,224,.08); color: var(--ok); }

    .card-number { font-family: 'SF Mono','Cascadia Code','Consolas',monospace; letter-spacing: .03em; }

    .td-actions { white-space: nowrap; }
    .td-actions .btn { margin-right: 4px; margin-bottom: 4px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      opacity: 0; visibility: hidden;
      transition: .3s;
      padding: 20px;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border-t);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 420px;
      width: 100%;
      transform: translateY(20px);
      transition: transform .3s;
    }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal h3 { font-size: 1rem; margin-bottom: 16px; }
    .modal .field { margin-bottom: 14px; }
    .modal .field label { display: block; font-size: .78rem; color: var(--text2); margin-bottom: 4px; }
    .modal .field input {
      width: 100%;
      padding: 10px 14px; font-size: .88rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      outline: none;
    }
    .modal .field input:focus { border-color: var(--teal-mid); }
    .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
    .modal-btns .btn { flex: 1; }

    .empty-msg { text-align: center; padding: 32px; color: var(--text2); font-size: .88rem; }
    .error-msg { color: var(--err); font-size: .82rem; margin-top: 8px; text-align: center; }
    .info-msg { color: var(--ok); font-size: .82rem; margin-top: 8px; text-align: center; }

    @media (max-width:600px) {
      .container { padding: 16px 12px 40px; }
      th, td { padding: 8px 6px; font-size: .75rem; }
      .btn-sm { padding: 5px 10px; font-size: .72rem; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">ALPINA PAY-OUT — Admin</span>
</div>

<div class="container">
  <h1>Управление реквизитами</h1>

  <div class="auth-box" id="authBox">
    <label>Пароль администратора</label>
    <input type="password" id="adminPassword" placeholder="Введите пароль" autocomplete="off">
    <br>
    <button class="btn btn-primary" id="loginBtn">Войти</button>
    <div class="error-msg" id="authError" style="display:none"></div>
  </div>

  <div id="mainPanel" style="display:none">
    <div class="actions">
      <button class="btn btn-primary" id="addCardBtn">+ Добавить карту</button>
      <button class="btn btn-secondary" id="seedBtn">Загрузить тестовые карты</button>
      <button class="btn btn-secondary" id="refreshBtn">Обновить</button>
    </div>

    <div class="info-msg" id="statusMsg" style="display:none"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Номер карты</th>
            <th>Банк</th>
            <th>Активна</th>
            <th>Статус</th>
            <th>Заказ</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="cardsBody">
          <tr><td colspan="6" class="empty-msg">Загрузка…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="cardModal">
  <div class="modal">
    <h3 id="modalTitle">Добавить карту</h3>
    <div class="field">
      <label>Номер карты</label>
      <input type="text" id="modalCardNumber" placeholder="0000 0000 0000 0000" maxlength="30" autocomplete="off">
    </div>
    <div class="field">
      <label>Название банка</label>
      <input type="text" id="modalBankName" placeholder="Например: Anor Bank" maxlength="100" autocomplete="off">
    </div>
    <div class="error-msg" id="modalError" style="display:none"></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="modalCancel">Отмена</button>
      <button class="btn btn-primary" id="modalSave">Сохранить</button>
    </div>
  </div>
</div>

<script src="/js/admin-requisites.js"></script>

</body>
</html>
